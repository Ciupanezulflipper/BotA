title = "BotA gitleaks config"
version = "8"

[extend]
useDefault = true

[[rules]]
id          = "oanda-api-token"
description = "OANDA API token"
regex       = '''(?i)oanda[_\-\s]*(?:api[_\-\s]*)?(?:token|key|secret)[_\-\s]*[=:]\s*["\']?\b([a-f0-9]{20,40}-[a-f0-9]{20,40})\b'''
keywords    = ["oanda"]
secretGroup = 1

  [[rules.allowlists]]
  description = "OANDA placeholder / example values"
  regexes     = ['''(?i)(?:your[_-]?oanda|example|placeholder|changeme|xxx)''']

[[rules]]
id          = "supabase-service-key-jwt"
description = "Supabase service-role JWT"
regex       = '''(?i)supabase[_\-\s]*(?:service[_\-\s]*(?:role|key)|secret)[_\-\s]*[=:]\s*["\']?(eyJ[A-Za-z0-9_\-]+\.[A-Za-z0-9_\-]+\.[A-Za-z0-9_\-]+)'''
keywords    = ["supabase"]
secretGroup = 1

  [[rules.allowlists]]
  description = "Supabase JWT placeholders"
  regexes     = ['''(?i)(?:your[_-]?supabase|example|placeholder|changeme|xxx)''']

[[rules]]
id          = "supabase-sb-secret"
description = "Supabase sb_secret_* service key"
regex       = '''\b(sb_secret_[A-Za-z0-9_\-]{20,})\b'''
keywords    = ["sb_secret_"]
secretGroup = 1

  [[rules.allowlists]]
  description = "sb_secret placeholders"
  regexes     = ['''(?i)(?:your[_-]?|example|placeholder|changeme|xxx)''']

[allowlist]
description = "Global allowlist"
paths = [
  '''^\.env\.example$''',
  '''^\.env\.sample$''',
  '''(?i)^tests?/''',
  '''(?i)^test_''',
  '''(?i)_test\.py$''',
  '''(?i)\.log$''',
  '''(?i)^logs?/''',
  '''(?i)^docs?/''',
  '''(?i)README''',
  '''(?i)^config\.backup-''',
  '''(?i)^_snapshots/''',
  '''(?i)^archive/''',
  '''(?i)^config/tele\.env$''',
  '''(?i)^\.env$''',
  '''(?i)^\.env\.''',
  '''(?i)^\.env\.runtime$''',
  '''(?i)^\.env\.profitlab$''',
  '''(?i)^\.env\.botA\.?''',
  '''(?i)^\.env\.bak\.''',
]
regexes = [
  '''(?i)(?:example|placeholder|changeme|your[_-]?(?:token|key|secret)|<[^>]+>|\$\{[^}]+\})''',
]
