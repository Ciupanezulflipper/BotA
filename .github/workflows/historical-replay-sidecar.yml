name: Historical replay sidecar

on:
  push:
    branches:
      - audit/historical-replay-20260601-20260710
  pull_request:
    paths:
      - "audit/historical_replay_20260601_20260710/**"
      - ".github/workflows/historical-replay-sidecar.yml"

permissions:
  contents: read

jobs:
  synthetic-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      TELEGRAM_BOT_TOKEN: ""
      TELEGRAM_TOKEN: ""
      TELEGRAM_CHAT_ID: ""
      SUPABASE_SERVICE_KEY: ""
      OANDA_API_TOKEN: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install pytest
      - name: Prohibit production imports in sidecar source
        run: |
          if grep -R -nE 'from tools|import tools|subprocess.*tools/' audit/historical_replay_20260601_20260710/src; then
            echo "production import or execution reference found"
            exit 1
          fi
      - name: Run synthetic tests
        run: python -m pytest -q audit/historical_replay_20260601_20260710/tests
