name: Security Scan

on:
  push:
  pull_request:

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          VERSION=8.28.0
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          chmod +x gitleaks

      - name: Run gitleaks
        run: |
          ./gitleaks detect \
            --config .gitleaks.toml \
            --source . \
            --report-format json \
            --report-path gitleaks-report.json \
            --redact \
            --exit-code 1 || LEAK=1
          echo "LEAK=${LEAK:-0}" >> "$GITHUB_ENV"

      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: ignore

      - name: Fail if leaks found
        if: env.LEAK == '1'
        run: exit 1

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        run: |
          find . -name '*.sh' -not -path './.git/*' \
            -exec shellcheck --severity=warning {} + \
            | tee shellcheck-report.txt || true

      - name: Upload ShellCheck report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shellcheck-report
          path: shellcheck-report.txt
          if-no-files-found: ignore

  bandit:
    name: Bandit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install Bandit
        run: pip install --quiet bandit

      - name: Run Bandit
        run: |
          bandit -r . \
            --exclude ./.git,./tests,./test \
            --severity-level medium \
            --confidence-level medium \
            -f json \
            -o bandit-report.json \
            || true

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          if-no-files-found: ignore
